name: Java CI with Maven & TestNG

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      httpbin:
        image: kong/httpbin:latest
        ports:
          - 8080:80

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Wait for HttpBin service to be healthy
      run: |
        echo "Waiting for local httpbin container..."
        for i in {1..15}; do
          if curl -s -f http://127.0.0.1:8080/get > /dev/null; then
            echo "HttpBin is up and responding!"
            exit 0
          fi
          echo "Waiting..."
          sleep 2
        done
        echo "Error: HttpBin failed to start in time."
        exit 1

    - name: Execute RestAssured Tests on QA Environment
      # Defaults env to 'qa' but permits overriding
      run: mvn clean test -Denv=qa -Dbase.uri.httpbin=http://127.0.0.1:8080

    - name: Upload HTML ExtentReports Artifacts
      if: always() # Guarantee report gets uploaded even if tests fail
      uses: actions/upload-artifact@v4
      with:
        name: Extent-Reports-Run
        path: target/reports/
        retention-days: 7
